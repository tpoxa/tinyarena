<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>model viewer</title>
  <style>html,body{margin:0;height:100%;background:#06070f;overflow:hidden}</style>
  <script type="importmap">
    { "imports": { "three": "/vendor/three/three.module.js" } }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { MODELS, buildModel } from '/js/models.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c1e);
scene.add(new THREE.HemisphereLight(0x4a55c0, 0x0a0714, 1.35));
const dir = new THREE.DirectionalLight(0xaab4ff, 1.1);
dir.position.set(18, 40, 12);
scene.add(dir);

const cols = 5;
const spacing = 2.0;
const rows = Math.ceil(MODELS.length / cols);
const floor = new THREE.Mesh(
  new THREE.BoxGeometry(cols * spacing + 2, 0.2, rows * spacing + 2),
  new THREE.MeshLambertMaterial({ color: 0x14162a }),
);
floor.position.set(0, -0.1, -(rows - 1) * spacing * 0.5);
scene.add(floor);

const palette = ['#5b6cff', '#27e0ff', '#ff3df0', '#ff9a3d', '#7dff3d', '#ff4b4b', '#ffe83d', '#3dffc8'];
const bodies = MODELS.map((m, i) => {
  const g = buildModel(m.id, palette[i % palette.length]);
  g.position.set(((i % cols) - (cols - 1) / 2) * spacing, 0, -Math.floor(i / cols) * spacing);
  scene.add(g);
  return g;
});

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 3.4, 7.5);
camera.lookAt(0, 0.9, -(rows - 1) * spacing * 0.5);

let t = 0;
function loop() {
  requestAnimationFrame(loop);
  t += 1 / 60;
  bodies.forEach((b, i) => {
    b.rotation.y = Math.PI + Math.sin(t * 0.5 + i) * 0.6; // sway to show all sides
    const parts = b.userData.parts;
    const swing = Math.sin(t * 7 + i) * 0.5 * 0.3;
    parts.legL.rotation.x = swing;
    parts.legR.rotation.x = -swing;
    parts.upper.position.y = parts.upperBaseY + Math.abs(Math.cos(t * 7 + i)) * 0.02;
  });
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
