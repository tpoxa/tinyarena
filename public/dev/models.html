<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>model viewer</title>
  <style>html,body{margin:0;height:100%;background:#06070f;overflow:hidden}</style>
  <script type="importmap">
    { "imports": { "three": "/vendor/three/three.module.js" } }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { playerMesh } from '/js/remotes.js';
import { makeGun } from '/js/guns.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c1e);
scene.add(new THREE.HemisphereLight(0x4a55c0, 0x0a0714, 1.35));
const dir = new THREE.DirectionalLight(0xaab4ff, 1.1);
dir.position.set(18, 40, 12);
scene.add(dir);

const floor = new THREE.Mesh(
  new THREE.BoxGeometry(10, 0.2, 6),
  new THREE.MeshLambertMaterial({ color: 0x14162a }),
);
floor.position.y = -0.1;
scene.add(floor);

const colors = ['#5b6cff', '#ff9a3d', '#7dff3d'];
const droids = colors.map((c, i) => {
  const d = playerMesh(c);
  d.position.set((i - 1) * 1.4, 0, 0);
  d.rotation.y = Math.PI; // face the camera
  const parts = d.userData.parts;
  parts.gunMount.clear();
  parts.gunMount.add(makeGun(i)); // one of each weapon
  scene.add(d);
  return d;
});

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.35, 3.6);
camera.lookAt(0, 0.95, 0);

let t = 0;
function loop() {
  requestAnimationFrame(loop);
  t += 1 / 60;
  droids.forEach((d, i) => {
    const parts = d.userData.parts;
    const amp = i === 1 ? 1 : 0.15; // middle one runs, others idle
    const swing = Math.sin(t * 7) * 0.75 * amp;
    parts.legL.rotation.x = swing;
    parts.legR.rotation.x = -swing;
    parts.upper.position.y = 1.0 + Math.abs(Math.cos(t * 7)) * 0.05 * amp;
    d.rotation.y = Math.PI + Math.sin(t * 0.4 + i) * 0.5; // slow sway to see sides
  });
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
